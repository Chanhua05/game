<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D魔方仿真（带自动还原）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }

        .status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="controls">
        <button id="shuffleBtn">打乱魔方</button>
        <button id="solveBtn" disabled>自动还原</button>
    </div>

    <div class="status" id="statusText">就绪 - 点击"打乱魔方"开始</div>

    <!-- 引入Three.js及控制器CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 全局变量
        let scene, camera, renderer, controls;
        let cube; // 魔方组
        let cubeBlocks = []; // 存储所有魔方小块
        let isRotating = false; // 是否正在旋转
        let shuffleSteps = []; // 存储打乱的步骤，用于还原
        let solveIndex = 0; // 还原步骤索引

        // 魔方颜色定义（标准魔方配色）
        const COLORS = {
            UP: 0xffffff,    // 上 - 白色
            DOWN: 0xffff00,  // 下 - 黄色
            LEFT: 0xff0000,  // 左 - 红色
            RIGHT: 0xff8800, // 右 - 橙色
            FRONT: 0x00ff00, // 前 - 绿色
            BACK: 0x0000ff   // 后 - 蓝色
        };

        // 初始化Three.js场景
        function init() {
            // 1. 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            // 2. 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 8, 8);
            camera.lookAt(0, 0, 0);

            // 3. 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. 添加轨道控制器（鼠标交互）
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 5. 添加光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight1.position.set(5, 5, 5);
            directionalLight1.castShadow = true;
            scene.add(directionalLight1);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            directionalLight2.position.set(-5, -5, 5);
            scene.add(directionalLight2);

            // 6. 创建魔方
            createCube();

            // 7. 监听窗口大小变化
            window.addEventListener('resize', onWindowResize);

            // 8. 绑定按钮事件
            document.getElementById('shuffleBtn').addEventListener('click', shuffleCube);
            document.getElementById('solveBtn').addEventListener('click', solveCube);

            // 9. 开始动画循环
            animate();
        }

        // 创建魔方（由27个小立方体组成）
        function createCube() {
            cube = new THREE.Group();
            const blockSize = 1.95; // 小块尺寸（留少量间隙）
            const gap = 0.05; // 小块之间的间隙

            // 遍历3x3x3的位置
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        // 创建小块的几何体
                        const geometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
                        const materials = [];

                        // 为每个面设置材质（只有外表面才显示对应颜色）
                        // 右 (+X)
                        materials.push(new THREE.MeshPhongMaterial({ 
                            color: x === 1 ? COLORS.RIGHT : 0x333333,
                            shininess: 100 
                        }));
                        // 左 (-X)
                        materials.push(new THREE.MeshPhongMaterial({ 
                            color: x === -1 ? COLORS.LEFT : 0x333333,
                            shininess: 100 
                        }));
                        // 上 (+Y)
                        materials.push(new THREE.MeshPhongMaterial({ 
                            color: y === 1 ? COLORS.UP : 0x333333,
                            shininess: 100 
                        }));
                        // 下 (-Y)
                        materials.push(new THREE.MeshPhongMaterial({ 
                            color: y === -1 ? COLORS.DOWN : 0x333333,
                            shininess: 100 
                        }));
                        // 前 (+Z)
                        materials.push(new THREE.MeshPhongMaterial({ 
                            color: z === 1 ? COLORS.FRONT : 0x333333,
                            shininess: 100 
                        }));
                        // 后 (-Z)
                        materials.push(new THREE.MeshPhongMaterial({ 
                            color: z === -1 ? COLORS.BACK : 0x333333,
                            shininess: 100 
                        }));

                        // 创建小块网格
                        const block = new THREE.Mesh(geometry, materials);
                        // 设置小块位置（加入间隙）
                        block.position.set(
                            x * (blockSize + gap),
                            y * (blockSize + gap),
                            z * (blockSize + gap)
                        );
                        // 记录小块的原始位置（用于层旋转判断）
                        block.userData = { originalX: x, originalY: y, originalZ: z };
                        
                        cube.add(block);
                        cubeBlocks.push(block);
                    }
                }
            }

            scene.add(cube);
        }

        // 旋转指定层的魔方
        // axis: 'x'/'y'/'z'，layer: -1/0/1，angle: 旋转角度（弧度），isAnimated: 是否动画
        function rotateLayer(axis, layer, angle, isAnimated = true) {
            return new Promise((resolve) => {
                if (isRotating) resolve();
                isRotating = true;

                const blocksToRotate = cubeBlocks.filter(block => {
                    return block.userData[`original${axis.toUpperCase()}`] === layer;
                });

                const startAngle = 0;
                const targetAngle = angle;
                const duration = 500; // 旋转动画时长（毫秒）
                const startTime = Date.now();

                function rotateStep() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const currentAngle = startAngle + (targetAngle - startAngle) * progress;

                    // 旋转指定层的所有块
                    blocksToRotate.forEach(block => {
                        block.rotation[axis] = currentAngle;
                    });

                    if (progress < 1) {
                        requestAnimationFrame(rotateStep);
                    } else {
                        // 动画结束后修正旋转值（避免累积小数）
                        blocksToRotate.forEach(block => {
                            block.rotation[axis] = targetAngle;
                            // 更新原始位置数据（用于后续旋转）
                            const rot = targetAngle;
                            const cos = Math.cos(rot);
                            const sin = Math.sin(rot);

                            if (axis === 'x') {
                                const y = block.userData.originalY;
                                const z = block.userData.originalZ;
                                block.userData.originalY = y * cos - z * sin;
                                block.userData.originalZ = y * sin + z * cos;
                            } else if (axis === 'y') {
                                const x = block.userData.originalX;
                                const z = block.userData.originalZ;
                                block.userData.originalX = x * cos + z * sin;
                                block.userData.originalZ = -x * sin + z * cos;
                            } else if (axis === 'z') {
                                const x = block.userData.originalX;
                                const y = block.userData.originalY;
                                block.userData.originalX = x * cos - y * sin;
                                block.userData.originalY = x * sin + y * cos;
                            }
                            // 四舍五入到整数（-1/0/1）
                            block.userData.originalX = Math.round(block.userData.originalX);
                            block.userData.originalY = Math.round(block.userData.originalY);
                            block.userData.originalZ = Math.round(block.userData.originalZ);
                        });

                        isRotating = false;
                        resolve();
                    }
                }

                if (isAnimated) {
                    rotateStep();
                } else {
                    // 无动画直接旋转
                    blocksToRotate.forEach(block => {
                        block.rotation[axis] = targetAngle;
                    });
                    isRotating = false;
                    resolve();
                }
            });
        }

        // 打乱魔方
        async function shuffleCube() {
            document.getElementById('shuffleBtn').disabled = true;
            document.getElementById('solveBtn').disabled = true;
            document.getElementById('statusText').textContent = '正在打乱魔方...';
            
            shuffleSteps = [];
            const stepsCount = 20; // 打乱的步数

            for (let i = 0; i < stepsCount; i++) {
                // 随机选择旋转轴、层和方向
                const axes = ['x', 'y', 'z'];
                const axis = axes[Math.floor(Math.random() * axes.length)];
                const layer = [-1, 0, 1][Math.floor(Math.random() * 3)];
                const angle = Math.PI / 2 * (Math.random() > 0.5 ? 1 : -1); // 90度或-90度

                // 记录打乱步骤（用于还原）
                shuffleSteps.push({ axis, layer, angle: -angle }); // 还原时需要反向旋转
                await rotateLayer(axis, layer, angle);
                
                // 更新进度
                document.getElementById('statusText').textContent = `正在打乱魔方... ${i+1}/${stepsCount}`;
            }

            document.getElementById('shuffleBtn').disabled = false;
            document.getElementById('solveBtn').disabled = false;
            document.getElementById('statusText').textContent = '魔方已打乱 - 点击"自动还原"恢复';
        }

        // 自动还原魔方
        async function solveCube() {
            if (shuffleSteps.length === 0) return;
            
            document.getElementById('shuffleBtn').disabled = true;
            document.getElementById('solveBtn').disabled = true;
            document.getElementById('statusText').textContent = '正在自动还原...';

            solveIndex = 0;
            // 逆序执行打乱的步骤（因为存储的是反向角度）
            while (solveIndex < shuffleSteps.length) {
                const step = shuffleSteps[shuffleSteps.length - 1 - solveIndex];
                await rotateLayer(step.axis, step.layer, step.angle);
                
                solveIndex++;
                document.getElementById('statusText').textContent = `正在自动还原... ${solveIndex}/${shuffleSteps.length}`;
            }

            document.getElementById('shuffleBtn').disabled = false;
            document.getElementById('statusText').textContent = '魔方已还原 - 可以再次打乱';
        }

        // 窗口大小适配
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // 更新轨道控制器
            renderer.render(scene, camera);
        }

        // 初始化
        init();
    </script>
</body>
</html>
